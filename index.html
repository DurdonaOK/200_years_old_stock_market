<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#000;color:#fff;font-family:'Share Tech Mono',monospace;overflow-x:hidden;cursor:crosshair}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.13) 2px,rgba(0,0,0,0.13) 4px);pointer-events:none;z-index:9998}
#mc{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.15;pointer-events:none}

/* TICKER */
.tw{position:sticky;top:0;z-index:1000;background:#000;border-bottom:2px solid #00ff41;padding:8px 0;overflow:hidden;white-space:nowrap}
.tt{display:inline-flex;gap:60px;animation:ticker 30s linear infinite;font-family:'Orbitron',monospace;font-size:11px;letter-spacing:1px}
.tt:hover{animation-play-state:paused}
.ti{display:inline-flex;align-items:center;gap:8px}
.ts{color:#fff;font-weight:700}.tv{color:#00ff41}
.tc.up{color:#00ff41}.tc.dn{color:#ff0000}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* HERO */
#hero{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.eye{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:6px;color:#00ff41;margin-bottom:24px;animation:fl 3s infinite;min-height:16px}
@keyframes fl{0%,100%{opacity:1}92%{opacity:1}93%{opacity:.3}94%{opacity:1}97%{opacity:.5}98%{opacity:1}}
.ht{font-family:'Bebas Neue',sans-serif;font-size:clamp(72px,15vw,180px);line-height:.9;color:#fff;letter-spacing:-2px;position:relative}
.ht .acc{color:#00ff41}.ht .dan{color:#ff0000}
.ht::before,.ht::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%}
.ht::before{color:#ff0000;animation:g1 3.5s infinite;clip-path:polygon(0 0,100% 0,100% 35%,0 35%)}
.ht::after{color:#00ff41;animation:g2 3.5s infinite;clip-path:polygon(0 65%,100% 65%,100% 100%,0 100%)}
@keyframes g1{0%,93%{transform:none;opacity:0}95%{transform:translate(-3px,0);opacity:.8}97%{opacity:0}}
@keyframes g2{0%,95%{transform:none;opacity:0}97%{transform:translate(3px,0);opacity:.8}99%{opacity:0}}
#tw{font-family:'Orbitron',monospace;font-size:clamp(13px,2.5vw,20px);color:#00ff41;margin:32px 0;min-height:56px;letter-spacing:2px}
.cur{animation:bl .7s infinite;color:#00ff41}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}

/* HERO COUNTERS */
.hc{display:flex;gap:32px;flex-wrap:wrap;justify-content:center;margin:32px 0}
.cb{border:1px solid rgba(0,255,65,.4);padding:20px 28px;text-align:center;background:rgba(0,255,65,.03);clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
.cv{font-family:'Bebas Neue',sans-serif;font-size:52px;color:#00ff41;display:block;line-height:1;transition:color .15s}
.cl{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.4);text-transform:uppercase;margin-top:4px}
.sh{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:10px;letter-spacing:4px;color:rgba(0,255,65,.5);animation:pd 2s infinite}
@keyframes pd{0%,100%{opacity:.5;transform:translateX(-50%) translateY(0)}50%{opacity:1;transform:translateX(-50%) translateY(8px)}}

/* SECTIONS */
section{position:relative;z-index:10;padding:80px 40px}
.sh2{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:6px;color:#00ff41;text-transform:uppercase;margin-bottom:12px;min-height:14px}
.st{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,8vw,96px);color:#fff;line-height:.95;margin-bottom:32px}
.st span[data-type]{display:inline-block;min-height:1em}

/* CHART */
#cs{background:#000;border-top:1px solid rgba(0,255,65,.2)}
.cw{position:relative;width:100%;height:500px;border:1px solid rgba(0,255,65,.3);background:rgba(0,255,65,.02)}

/* STATS GRID */
#stats{background:#000;border-top:2px solid #ff0000}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:2px;background:rgba(255,0,0,.07);margin:40px 0}
.sc{background:#000;padding:28px 22px;border:1px solid rgba(255,255,255,.06);position:relative;overflow:hidden;transition:background .12s,border-color .12s;min-height:180px}
.sy{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:4px;color:rgba(255,255,255,.3);margin-bottom:8px}
.sv{font-family:'Bebas Neue',sans-serif;font-size:60px;line-height:1;margin-bottom:4px;transition:color .1s,text-shadow .1s}
.sd{font-family:'Orbitron',monospace;font-size:10px;color:rgba(255,255,255,.45);line-height:1.75;white-space:pre-line;min-height:52px}
.pb{width:100%;height:2px;background:rgba(255,255,255,.07);margin-top:12px;overflow:hidden}
.pf{height:100%;width:0%;transition:width 1.8s cubic-bezier(.22,1,.36,1)}

/* CARD BLINK ANIMATIONS */
@keyframes coff{0%{opacity:1}30%{opacity:.05}50%{opacity:.8}65%{opacity:.05}100%{opacity:0}}
@keyframes con{0%{opacity:0;background:#001800}15%{opacity:.9;background:#002500}100%{opacity:1;background:#000}}
.blink-off{animation:coff .32s ease forwards}
.blink-on{animation:con .45s ease forwards}

/* LIVE FEED */
#lf{background:rgba(0,4,0,.99);border-top:1px solid rgba(0,255,65,.3);border-bottom:1px solid rgba(0,255,65,.3)}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:1px;background:rgba(0,255,65,.07);margin-top:28px}
.fc{background:#000;padding:18px 14px;font-family:'Orbitron',monospace;font-size:11px}
@keyframes fgl{0%{background:#001d00}100%{background:#000}}
@keyframes frl{0%{background:#1a0000}100%{background:#000}}
.fc.fg2{animation:fgl .4s ease}.fc.fr2{animation:frl .4s ease}
.fsym{color:#fff;font-weight:700;font-size:13px;margin-bottom:5px}
.fp{font-size:21px;font-family:'Bebas Neue',sans-serif;margin-bottom:2px}
.fch{font-size:10px;letter-spacing:1px}
.up{color:#00ff41}.dn{color:#ff0000}

/* DUAL CHARTS */
#gr{background:#000;border-top:1px solid rgba(0,255,65,.2)}
.dc{display:grid;grid-template-columns:1fr 1fr;gap:2px}
@media(max-width:768px){.dc{grid-template-columns:1fr}}
.mw{border:1px solid rgba(0,255,65,.2);padding:24px;background:rgba(0,255,65,.01)}
.mt{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.5);margin-bottom:14px;min-height:14px}

/* QUOTE */
#qs{background:#000;padding:100px 40px;text-align:center;border-top:1px solid rgba(255,255,255,.04);position:relative;z-index:10}
.qt{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,5.5vw,76px);line-height:1.05;color:#fff;max-width:1200px;margin:0 auto;min-height:120px}
.qt .hl{color:#00ff41}.qt .hl2{color:#ff0000}
.qa{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:4px;color:rgba(255,255,255,.3);margin-top:28px;text-transform:uppercase;min-height:14px}

/* TIMELINE */
#tl{background:#000;border-top:1px solid rgba(255,0,0,.2)}
.tlw{position:relative;padding:40px 0}
.tll{position:absolute;left:50%;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,#00ff41,#ff0000,transparent)}
.tli{display:flex;margin-bottom:60px;align-items:flex-start;gap:40px}
.tli:nth-child(even){flex-direction:row-reverse}
.tli:nth-child(even) .tlc{text-align:right}
.tlc{flex:1;padding:0 40px;opacity:0;transform:translateX(-20px);transition:opacity .7s ease,transform .7s ease}
.tlc.vis{opacity:1;transform:none}
.tly{font-family:'Bebas Neue',sans-serif;font-size:48px;color:#00ff41;line-height:1;min-height:52px}
.tly.crash{color:#ff0000}
.tle{font-family:'Orbitron',monospace;font-size:11px;color:rgba(255,255,255,.8);margin-top:4px;line-height:1.8;min-height:60px}
.tlv{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;margin-top:8px;min-height:14px}
.tld{width:16px;height:16px;border-radius:50%;border:2px solid #00ff41;background:#000;flex-shrink:0;margin-top:16px;box-shadow:0 0 10px rgba(0,255,65,.5);position:relative;z-index:1}
.tld.crash{border-color:#ff0000;box-shadow:0 0 10px rgba(255,0,0,.5)}
@media(max-width:768px){.tll{left:20px}.tli,.tli:nth-child(even){flex-direction:row}.tli:nth-child(even) .tlc{text-align:left}}

/* CLOSING */
#cl{background:#000;padding:120px 40px;text-align:center;border-top:2px solid #fff;position:relative;z-index:10}
.ct{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,11vw,136px);line-height:.9;color:#fff}
.ct span.grn{display:block;color:#00ff41}
.cs2{font-family:'Orbitron',monospace;font-size:12px;letter-spacing:4px;color:rgba(255,255,255,.35);margin-top:32px;text-transform:uppercase;min-height:14px}

/* BOTTOM */
.bb{background:#000;border-top:1px solid rgba(0,255,65,.3);padding:12px 40px;display:flex;justify-content:space-between;font-family:'Orbitron',monospace;font-size:9px;color:rgba(255,255,255,.2);letter-spacing:2px;position:relative;z-index:10}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ── MATRIX RAIN ──────────────────────────────────────────────────────────────
(function(){
  const cv=document.getElementById('mc'),cx=cv.getContext('2d');
  const CH='0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ$+-.%▲▼■';
  let W,H,cols,drops;
  function init(){W=cv.width=innerWidth;H=cv.height=innerHeight;cols=Math.floor(W/13);drops=new Array(cols).fill(1)}
  function draw(){
    cx.fillStyle='rgba(0,0,0,0.05)';cx.fillRect(0,0,W,H);
    cx.font='13px Share Tech Mono,monospace';
    for(let i=0;i<cols;i++){
      cx.fillStyle=i%7===0?'#fff':(i%11===0?'#ff0000':'#00ff41');
      cx.globalAlpha=Math.random()*.7+.3;
      cx.fillText(CH[Math.floor(Math.random()*CH.length)],i*13,drops[i]*13);
      cx.globalAlpha=1;
      if(drops[i]*13>H&&Math.random()>.975)drops[i]=0;
      drops[i]++;
    }
  }
  init();setInterval(draw,50);addEventListener('resize',init);
})();

// ── CLOCK ─────────────────────────────────────────────────────────────────────
setInterval(()=>{document.getElementById('lt').textContent=new Date().toLocaleTimeString('en-US',{hour12:false})+' EST';},1000);

// ── HERO TYPEWRITER (cycling) ─────────────────────────────────────────────────
const HLINES=["THE DOW JONES HAS RETURNED +59,000% SINCE 1900","EVERY SINGLE CRASH HAS BEEN TEMPORARY","$1 INVESTED IN 1900 IS WORTH $590 TODAY","THE MARKET HAS NEVER PERMANENTLY FAILED","COMPOUND INTEREST: THE EIGHTH WONDER OF THE WORLD","BUY. HOLD. DON'T LOOK. PROFIT.","TIME IN THE MARKET BEATS TIMING THE MARKET","200 YEARS OF DATA. ONE CONCLUSION: UP."];
let hl=0,hc=0,hd=false;
const htw=document.getElementById('tw2');
function htype(){
  const ln=HLINES[hl];
  if(!hd){htw.innerHTML=ln.substring(0,hc+1)+'<span class="cur">_</span>';hc++;if(hc===ln.length){hd=true;setTimeout(htype,2400);return;}setTimeout(htype,42);}
  else{htw.innerHTML=ln.substring(0,hc)+'<span class="cur">_</span>';hc--;if(hc<0){hd=false;hl=(hl+1)%HLINES.length;hc=0;setTimeout(htype,350);return;}setTimeout(htype,18);}
}
// Type hero eyebrow immediately
(function(){const el=document.getElementById('eyebrow'),txt='■ LIVE — MARKET INTELLIGENCE TERMINAL ■';let i=0;function t(){if(i<=txt.length){el.textContent=txt.substring(0,i);i++;setTimeout(t,38);}}t();setTimeout(htype,500);})();

// ── HERO COUNTERS — count from 0 on load ─────────────────────────────────────
function countUp(elId,tgt,dur,sfx,money){
  const el=document.getElementById(elId);el.textContent='0'+(sfx||'');
  const t0=performance.now();
  (function step(n){const p=Math.min((n-t0)/dur,1),e=1-Math.pow(1-p,4),v=Math.floor(e*tgt);
    el.textContent=(money?v.toLocaleString():v)+(sfx||'');
    if(p<1)requestAnimationFrame(step);else el.textContent=(money?tgt.toLocaleString():tgt)+(sfx||'');
  })(t0);
}
countUp('c1',39127,3400,'',true);
countUp('c2',590,3000,'x',false);
countUp('c3',5254,3600,'',true);
countUp('c4',128,2800,' yrs',false);

// DJIA live pulse after load
setTimeout(()=>{setInterval(()=>{
  const el=document.getElementById('c1'),v=parseInt(el.textContent.replace(/,/g,''));
  if(isNaN(v))return;const d=Math.floor((Math.random()-.46)*18);
  el.textContent=(v+d).toLocaleString();el.style.color=d>=0?'#00ff41':'#ff0000';
  el.animate([{transform:'scale(1.08)'},{transform:'scale(1)'}],{duration:160,easing:'ease-out'});
},1600);},3500);

// ── SCROLL TYPEWRITER ENGINE ──────────────────────────────────────────────────
// Every element with data-type gets typed in when scrolled into view
const TYPED=new Set();
const SPEED=26; // ms per char

function typeElement(el){
  if(TYPED.has(el))return;
  TYPED.add(el);
  const txt=el.getAttribute('data-type');
  if(!txt){el.style.opacity='1';return;}
  el.textContent='';
  let i=0;
  (function tick(){
    if(i<=txt.length){
      el.textContent=txt.substring(0,i)+(i<txt.length?'▌':'');
      i++;setTimeout(tick,SPEED+Math.random()*12);
    } else {el.textContent=txt;}
  })();
}

const typeObs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting)typeElement(e.target);});
},{threshold:0.12,rootMargin:'0px 0px -30px 0px'});

document.querySelectorAll('[data-type]').forEach(el=>{
  if(el.id==='eyebrow')return; // handled above
  typeObs.observe(el);
});

// Timeline content reveal
const tlObs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add('vis');
      e.target.querySelectorAll('[data-type]').forEach(c=>typeElement(c));
    }
  });
},{threshold:0.15});

const FS=[
  {s:'DJIA',b:39127},{s:'S&P500',b:5254},{s:'NASDAQ',b:16384},
  {s:'AAPL',b:189.3},{s:'MSFT',b:420.5},{s:'GOOGL',b:160.4},
  {s:'AMZN',b:181.2},{s:'NVDA',b:879.4},{s:'META',b:515.2},
  {s:'TSLA',b:172.6},{s:'JPM',b:198.4},{s:'V',b:273.5},
  {s:'BRK.B',b:406.1},{s:'WMT',b:60.2},{s:'XOM',b:119.8},
  {s:'UNH',b:487.2},{s:'JNJ',b:162.8},{s:'PG',b:161.4},{s:'MA',b:468.3},{s:'HD',b:355.7},
];
const FD={};FS.forEach(s=>FD[s.s]={p:s.b,b:s.b});
const feedg=document.getElementById('feedg');
feedg.innerHTML=FS.map(s=>{const id='f'+s.s.replace(/[^a-z0-9]/gi,'_');return `<div class="fc" id="${id}"><div class="fsym">${s.s}</div><div class="fp up" id="${id}p">0.00</div><div class="fch up" id="${id}c">▲ 0.00%</div></div>`;}).join('');

// Count feed from 0 on scroll in
let feedDone=false;
const feedObs=new IntersectionObserver(entries=>{
  if(entries[0].isIntersecting&&!feedDone){feedDone=true;feedObs.disconnect();
    FS.forEach((s,idx)=>setTimeout(()=>{
      const id='f'+s.s.replace(/[^a-z0-9]/gi,'_');const pel=document.getElementById(id+'p');if(!pel)return;
      const t0=performance.now();const dur=1000+idx*55;
      (function step(n){const p=Math.min((n-t0)/dur,1),e=1-Math.pow(1-p,3),v=e*s.b;
        pel.textContent=v.toFixed(2);if(p<1)requestAnimationFrame(step);else pel.textContent=FD[s.s].p.toFixed(2);
      })(t0);
    },idx*35));
  }
},{threshold:0.1});
feedObs.observe(feedg);

setInterval(()=>{
  const sym=FS[Math.floor(Math.random()*FS.length)].s;
  const d=FD[sym];const delta=(Math.random()-.45)*d.b*.003;
  d.p=Math.max(d.p+delta,.1);
  const pct=((d.p-d.b)/d.b)*100;
  const id='f'+sym.replace(/[^a-z0-9]/gi,'_');
  const card=document.getElementById(id),pel=document.getElementById(id+'p'),cel=document.getElementById(id+'c');
  if(!card||!pel)return;const up=delta>=0;
  pel.textContent=d.p.toFixed(2);pel.className='fp '+(up?'up':'dn');
  cel.textContent=(up?'▲ ':'▼ ')+Math.abs(pct).toFixed(2)+'%';cel.className='fch '+(up?'up':'dn');
  card.classList.remove('fg2','fr2');void card.offsetWidth;card.classList.add(up?'fg2':'fr2');
},170);

const DONE=new Array(SDATA.length).fill(false);

document.getElementById('sg').innerHTML=SDATA.map((d,i)=>`
<div class="sc" id="sc${i}">
  <div class="sy">${d.yr}</div>
  <div class="sv" id="sv${i}" style="color:${d.neg?'#ff0000':'#00ff41'};text-shadow:0 0 20px ${d.neg?'rgba(255,0,0,.4)':'rgba(0,255,65,.4)'}">0${d.sfx}</div>

function countCard(i){
  const d=SDATA[i],vel=document.getElementById('sv'+i),bel=document.getElementById('pf'+i);
  const t0=performance.now(),dur=1600+i*100,pfx=d.neg?'-':'';
  (function step(n){const p=Math.min((n-t0)/dur,1),e=1-Math.pow(1-p,3),v=Math.floor(e*d.tgt);
    vel.textContent=pfx+v.toLocaleString()+d.sfx;bel.style.width=(e*d.bw)+'%';
    if(p<1)requestAnimationFrame(step);else{vel.textContent=pfx+d.tgt.toLocaleString()+d.sfx;bel.style.width=d.bw+'%';}
  })(t0);
}

const cObs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{const i=parseInt(e.target.id.replace('sc',''));if(e.isIntersecting&&!isNaN(i)&&!DONE[i]){DONE[i]=true;setTimeout(()=>countCard(i),i*80);}});
},{threshold:0.2});
SDATA.forEach((_,i)=>{const el=document.getElementById('sc'+i);if(el)cObs.observe(el);});

// Live twitch every 200ms
setInterval(()=>{
  const i=Math.floor(Math.random()*SDATA.length);
  if(!DONE[i]||!VIS[i])return;
  const d=SDATA[i],lv=LV[i],vel=document.getElementById('sv'+i),card=document.getElementById('sc'+i),bel=document.getElementById('pf'+i);
  if(!vel||!card)return;
  const delta=(Math.random()-.45)*lv.b*.005;lv.c=Math.max(lv.c+delta,.1);
  const up=delta>=0,pfx=d.neg?'-':'';
  vel.textContent=pfx+Math.round(lv.c).toLocaleString()+d.sfx;
  vel.style.color=up?'#00ff41':'#ff0000';
  vel.style.textShadow=up?'0 0 24px rgba(0,255,65,.65)':'0 0 24px rgba(255,0,0,.65)';
  card.style.borderColor=up?'rgba(0,255,65,.5)':'rgba(255,0,0,.5)';
  card.style.background=up?'rgba(0,255,65,.035)':'rgba(255,0,0,.035)';
  if(bel)bel.style.background=up?'linear-gradient(90deg,#00ff41,#00cc33)':'linear-gradient(90deg,#ff0000,#880000)';
  vel.animate([{transform:'scale(1.1)'},{transform:'scale(1)'}],{duration:170,easing:'ease-out'});
  if(Math.random()<.05)card.animate([{background:up?'rgba(0,255,65,.14)':'rgba(255,0,0,.14)'},{background:''}],{duration:380});
},200);

// SWITCH ON / OFF — cards blink out and scramble back in
setInterval(()=>{
  const i=Math.floor(Math.random()*SDATA.length);
  if(!DONE[i]||!VIS[i])return;
  const card=document.getElementById('sc'+i);if(!card)return;
  VIS[i]=false;
  card.classList.remove('blink-on');card.classList.add('blink-off');
  const offDur=320+Math.random()*600;
  setTimeout(()=>{
    // Scramble numbers during off phase
    const vel=document.getElementById('sv'+i);
    if(vel){
      const d=SDATA[i];let sc=6;
      const iv=setInterval(()=>{
        vel.textContent=(d.neg?'-':'')+Math.floor(Math.random()*d.tgt*2).toLocaleString()+d.sfx;
        vel.style.color=['#00ff41','#ff0000','#ffffff','#ff0000','#00ff41'][Math.floor(Math.random()*5)];
        if(--sc<=0){clearInterval(iv);vel.textContent=(d.neg?'-':'')+Math.round(LV[i].c).toLocaleString()+d.sfx;}
      },55);
    }
    card.classList.remove('blink-off');card.classList.add('blink-on');
    VIS[i]=true;
  },offDur);
},1100+Math.random()*400);

// ── QUOTE ROTATOR (typed) ─────────────────────────────────────────────────────
const QS=[
  {t:'THE STOCK MARKET IS A DEVICE FOR TRANSFERRING MONEY FROM THE IMPATIENT TO THE PATIENT',a:'— WARREN BUFFETT'},
  {t:"IN THE SHORT RUN THE MARKET IS A VOTING MACHINE. IN THE LONG RUN IT IS A WEIGHING MACHINE.",a:'— BENJAMIN GRAHAM'},
  {t:"THE FOUR MOST DANGEROUS WORDS: THIS TIME IT'S DIFFERENT",a:'— SIR JOHN TEMPLETON'},
  {t:'THE BEST TIME TO PLANT A TREE WAS 20 YEARS AGO. THE SECOND BEST TIME IS NOW.',a:'— CHINESE PROVERB'},
  {t:'COMPOUND INTEREST IS THE EIGHTH WONDER OF THE WORLD. HE WHO UNDERSTANDS IT EARNS IT.',a:'— EINSTEIN (ATTRIBUTED)'},
];
let qi=0;const qdel=document.getElementById('qd'),qael=document.getElementById('qa');
function typeQ(){
  const q=QS[qi];qdel.textContent='';qael.textContent='';
  const hls=['PATIENT','LONG','EARNS','WEIGHING'];const hls2=['IMPATIENT','VOTING','DANGEROUS','DIFFERENT'];
  let ci=0;
  (function tick(){
    if(ci<=q.t.length){
      qdel.textContent=q.t.substring(0,ci)+(ci<q.t.length?'▌':'');ci++;setTimeout(tick,20+Math.random()*10);
    } else {
      qdel.innerHTML=q.t.split(' ').map(w=>{
        if(hls.some(h=>w.includes(h)))return`<span class="hl">${w}</span>`;
        if(hls2.some(h=>w.includes(h)))return`<span class="hl2">${w}</span>`;
        return w;
      }).join(' ');
      let ai=0;(function atk(){if(ai<=q.a.length){qael.textContent=q.a.substring(0,ai);ai++;setTimeout(atk,38);}})();
    }
  })();
}
const qObs=new IntersectionObserver(e=>{if(e[0].isIntersecting){qObs.disconnect();typeQ();setInterval(()=>{qi=(qi+1)%QS.length;typeQ();},7500);}},{threshold:.3});
qObs.observe(document.getElementById('qs'));
</script>
